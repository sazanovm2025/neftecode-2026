# Set-Transformer (deep) — ensemble diversification variant.
# Same architecture class as base set_transformer, but one extra SAB block.
# Kept distinct via model_type so aggregate_cv.py can separate its runs.
model_type: set_transformer_deep
lr: 5.0e-4
weight_decay: 1.0e-3
epochs: 80
batch_size: 32
huber_delta: 1.0
sign_weight: 0.2
dropout: 0.2
component_dropout: 0.1

# architecture — one extra SAB block
dim_model: 64
num_heads: 4
ff_dim: 128
num_sab_blocks: 3   # was 2
fusion_hidden: 128
comp_emb_dim: 16
type_emb_dim: 8
mode_emb_dim: 8
