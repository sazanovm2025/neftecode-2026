# Set-Transformer — component-level attention + scenario-level MLP.
model_type: set_transformer
lr: 5.0e-4
weight_decay: 1.0e-3
epochs: 80
batch_size: 32
huber_delta: 1.0
sign_weight: 0.2
dropout: 0.2
component_dropout: 0.1  # drop one random component with p=0.1 during training

# architecture
dim_model: 64
num_heads: 4
ff_dim: 128
num_encoder_blocks: 2
fusion_hidden: 128
comp_emb_dim: 16
type_emb_dim: 8
mode_emb_dim: 8
